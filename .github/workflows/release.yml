name: Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel — "beta" for prereleases, "latest" for stable.'
        type: choice
        options: [beta, latest]
        required: true
        default: beta
      version:
        description: 'Version (e.g. 0.2.0-beta.1). Leave blank to auto-suggest from package.json.'
        type: string
        required: false
      dry_run:
        description: 'Dry run — skips git push, GitHub release, and npm publish.'
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push the version-bump commit + tag to main
      id-token: write       # OIDC token for npm Trusted Publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to a Trusted-Publishing-capable version
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Resolve target version
        id: version
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ inputs.version }}"
          CHANNEL="${{ inputs.channel }}"
          CURRENT=$(node -p "require('./package.json').version")
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          elif [ "$CHANNEL" = "beta" ]; then
            if [[ "$CURRENT" =~ -beta\.([0-9]+)$ ]]; then
              N=$(( ${BASH_REMATCH[1]} + 1 ))
              VERSION="${CURRENT%-beta.*}-beta.$N"
            else
              VERSION="${CURRENT%%-*}-beta.0"
            fi
          else
            if [[ "$CURRENT" =~ ^([0-9]+\.[0-9]+\.[0-9]+)- ]]; then
              VERSION="${BASH_REMATCH[1]}"
            else
              echo "::error::Channel 'latest' needs an explicit 'version' input when package.json is already a stable release ($CURRENT). Pick the next stable version (e.g. ${CURRENT%.*}.$((${CURRENT##*.} + 1)))."
              exit 1
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION (channel: $CHANNEL)"

      - name: Validate channel/version consistency
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          CHANNEL="${{ inputs.channel }}"
          if [ "$CHANNEL" = "latest" ] && [[ "$VERSION" == *-* ]]; then
            echo "::error::Channel 'latest' cannot be a prerelease (got $VERSION)."
            exit 1
          fi
          if [ "$CHANNEL" = "beta" ] && [[ "$VERSION" != *-* ]]; then
            echo "::error::Channel 'beta' must be a prerelease (e.g. 0.2.0-beta.1). Got: $VERSION"
            exit 1
          fi

      - name: Check version is unpublished
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "@moody-church/n8n-nodes-ministry-platform@$VERSION" version 2>/dev/null; then
            echo "::error::Version $VERSION is already published to npm. Pick a different version."
            exit 1
          fi

      - name: Bump package.json
        run: |
          set -euo pipefail
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release v${{ steps.version.outputs.version }} [skip ci]"
          git tag "v${{ steps.version.outputs.version }}"

      - name: Push commit and tag
        if: ${{ inputs.dry_run == false }}
        run: |
          set -euo pipefail
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        if: ${{ inputs.dry_run == false }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PRERELEASE_FLAG=""
          if [ "${{ inputs.channel }}" = "beta" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            $PRERELEASE_FLAG

      - name: Publish to npm (Trusted Publishing + provenance)
        if: ${{ inputs.dry_run == false }}
        run: |
          set -euo pipefail
          # No NODE_AUTH_TOKEN — npm CLI uses the OIDC token from id-token: write.
          # Requires a Trusted Publisher to be configured on the package's npm
          # settings page (see RELEASING.md). --provenance adds the verified
          # provenance attestation that npm displays on the package page.
          npm publish --tag "${{ inputs.channel }}" --access public --provenance

      - name: Summary
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "::notice title=Dry run::Would have released v${{ steps.version.outputs.version }} to ${{ inputs.channel }}. No git push, GH release, or npm publish performed."
          else
            echo "::notice title=Released::v${{ steps.version.outputs.version }} published to npm dist-tag ${{ inputs.channel }}."
          fi
